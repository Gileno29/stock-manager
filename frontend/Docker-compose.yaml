version: '3.8'

services:
  # O Coração da Mensageria
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    ports:
      - "5672:5672"   # Porta do protocolo AMQP (onde os serviços conectam)
      - "15672:15672" # Porta da Interface Web (User/Pass: guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - microservices_net

  # Banco de Dados para o Serviço de Compras (Python)
  order_db:
    image: postgres:15
    container_name: order_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order_service_db
    ports:
      - "5433:5432" # Porta externa 5433 para não conflitar se você já tiver Postgres local
    networks:
      - microservices_net

  # Banco de Dados para o Serviço de Estoque (Go)
  inventory_db:
    image: postgres:15
    container_name: inventory_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inventory_service_db
    ports:
      - "5434:5432"
    networks:
      - microservices_net

networks:
  microservices_net:
    driver: bridge